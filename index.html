<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge | Two Word Smiths</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Base Iron & Charcoal Hearth */
        body { font-family: 'Comfortaa', sans-serif; background-color: #0d0e12; color: #b2b5bd; padding: 40px 20px; line-height: 1.8; position: relative; overflow-x: hidden; min-height: 100vh; transition: opacity 0.4s ease; }
        
        /* Background Embers Canvas */
        #emberCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        /* Floating, Disintegrating Magic Quill */
        #magicQuill {
            position: fixed;
            font-size: 2rem;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(255, 106, 0, 0.6));
            /* Smoothly animate changes to coordinates and opacity */
            transition: transform 4s ease-in-out, opacity 1.5s ease-in-out, filter 2s ease;
        }
        .container { max-width: 950px; margin: 0 auto; background: linear-gradient(145deg, rgba(20, 22, 28, 0.9), rgba(10, 11, 14, 0.95)); padding: 45px; border-radius: 16px; backdrop-filter: blur(12px); border: 1px solid rgba(255, 106, 0, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* The Security Crossbar Layout */
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255, 106, 0, 0.15); padding-bottom: 20px; }
        .nav-link { color: #ff6a00; text-decoration: none; font-size: 0.85rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; text-shadow: 0 0 8px rgba(255, 106, 0, 0.3); }
        .lock-btn { color: #ff6a00; text-decoration: none; font-size: 1.4rem; cursor: pointer; transition: transform 0.2s ease, text-shadow 0.2s ease; display: inline-block; }
        .lock-btn:hover { transform: scale(1.1); text-shadow: 0 0 12px #ff6a00; }

        header { margin-bottom: 50px; text-align: center; position: relative; }
        h1 { color: #ffffff; font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .subtitle { color: #ff6a00; font-size: 1rem; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 0; font-weight: 500; }
        
        /* Forge Hearth Blocks */
        .forge-hearth { background: rgba(18, 20, 26, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); padding: 35px; border-radius: 12px; margin-bottom: 35px; transition: border 0.3s ease, box-shadow 0.3s ease; position: relative; overflow: hidden; }
        .forge-hearth:hover { border-color: rgba(255, 106, 0, 0.3); box-shadow: 0 0 25px rgba(255, 106, 0, 0.05); }
        
        .anvil-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; margin-bottom: 35px; }
        @media (max-width: 768px) { .anvil-grid { grid-template-columns: 1fr; } }
        
        /* Molten Typography */
        h2 { color: #ffffff; font-size: 1.4rem; margin-top: 0; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
        h3 { color: #ff6a00; font-size: 1.05rem; margin-top: 0; margin-bottom: 25px; letter-spacing: 3px; text-transform: uppercase; border-left: 3px solid #ff6a00; padding-left: 12px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 14px; }
        
        /* Ore Links */
        .ingot-link { color: #9da1aa; text-decoration: none; font-size: 1.05rem; transition: all 0.25s ease, opacity 0.4s ease; display: inline-block; }
        .ingot-link:hover { color: #ffffff; padding-left: 8px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .heat-tag { font-size: 0.75rem; color: #ff6a00; margin-left: 10px; letter-spacing: 1px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        .cool-tag { font-size: 0.75rem; color: #00d2ff; margin-left: 10px; letter-spacing: 1px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        
        /* Class to trigger the smooth fade out */
        .fade-out { opacity: 0; pointer-events: none; }
        body { transition: opacity 0.4s ease; }
        
        /* Grid Alignment Layouts */
        .spark-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
